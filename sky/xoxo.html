<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOXO Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .game {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            border: 2px solid #000;
            padding: 10px;
            background-color: #fff;
        }
        .box {
            width: 100px;
            height: 100px;
            border: 2px solid #000;
            background-color: #000; /* Change to black */
            color: #fff; /* Change text color to white */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
        }
        .box:hover {
            background-color: #333; /* Darken on hover */
        }
        .win {
            background-color: #b9ffb9;
        }
        .restart-btn {
            margin-top: 20px;
            padding: 10px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game"></div>
    <button class="restart-btn" onclick="startGame()">Restart Game</button>
    <script>
        const game = document.querySelector('.game');
        const restartBtn = document.querySelector('.restart-btn');

        function startGame() {
            // Clear the board
            game.innerHTML = '';

            // Create the game board
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    const box = document.createElement('div');
                    box.classList.add('box');
                    game.appendChild(box);
                }
            }

            // Reset styles
            restartBtn.style.display = 'none';

            // Start the game loop
            initGame();
        }

        function initGame() {
            const boxes = document.querySelectorAll('.box');
            let player = 'X';
            let computer = 'O';
            let currentPlayer = player;
            let numMoves = 0;
            let winner = '';
            let difficulty = 'medium';
            let level = 1;

            for (let box of boxes) {
                box.addEventListener('click', handleClick);
            }

            function handleClick() {
                if (this.textContent === '' && !winner && currentPlayer === player) {
                    this.textContent = player;
                    numMoves++;

                    if (checkWin(player)) {
                        winner = player;
                        level++;
                        gameOver(`Level ${level} - Player ${winner} wins!`);
                    } else if (numMoves === 9) {
                        gameOver('It\'s a tie!');
                    } else {
                        currentPlayer = computer;
                        setTimeout(computerMove, 500);
                    }
                }
            }

            function computerMove() {
                let availableBoxes = Array.from(boxes).filter(box => box.textContent === '');

                if (difficulty === 'easy') {
                    const randomIndex = Math.floor(Math.random() * availableBoxes.length);
                    availableBoxes[randomIndex].textContent = computer;
                } else if (difficulty === 'medium') {
                    const playerWinningMove = findWinningMove(player);

                    if (playerWinningMove) {
                        playerWinningMove.textContent = computer;
                    } else {
                        const randomIndex = Math.floor(Math.random() * availableBoxes.length);
                        availableBoxes[randomIndex].textContent = computer;
                    }
                } else {
                    const randomIndex = Math.floor(Math.random() * availableBoxes.length);
                    availableBoxes[randomIndex].textContent = computer;
                }

                numMoves++;

                if (checkWin(computer)) {
                    winner = computer;
                    level = 1; // Reset level on computer win
                    gameOver(`Game Over - Player ${winner} wins!`);
                } else if (numMoves === 9) {
                    gameOver('It\'s a tie!');
                } else {
                    currentPlayer = player;
                }
            }

            function checkWin(symbol) {
                const lines = [
                    [0, 1, 2],
                    [3, 4, 5],
                    [6, 7, 8],
                    [0, 3, 6],
                    [1, 4, 7],
                    [2, 5, 8],
                    [0, 4, 8],
                    [2, 4, 6]
                ];

                for (let line of lines) {
                    const [a, b, c] = line;
                    if (
                        boxes[a].textContent === symbol &&
                        boxes[b].textContent === symbol &&
                        boxes[c].textContent === symbol
                    ) {
                        boxes[a].classList.add('win');
                        boxes[b].classList.add('win');
                        boxes[c].classList.add('win');
                        return true;
                    }
                }
                return false;
            }

            function findWinningMove(symbol) {
                const lines = [
                    [0, 1, 2],
                    [3, 4, 5],
                    [6, 7, 8],
                    [0, 3, 6],
                    [1, 4, 7],
                    [2, 5, 8],
                    [0, 4, 8],
                    [2, 4, 6]
                ];

                for (let line of lines) {
                    const [a, b, c] = line;

                    if (
                        boxes[a].textContent === symbol &&
                        boxes[b].textContent === symbol &&
                        boxes[c].textContent === ''
                    ) {
                        return boxes[c];
                    }

                    if (
                        boxes[a].textContent === symbol &&
                        boxes[b].textContent === '' &&
                        boxes[c].textContent === symbol
                    ) {
                        return boxes[b];
                    }

                    if (
                        boxes[a].textContent === '' &&
                        boxes[b].textContent === symbol &&
                        boxes[c].textContent === symbol
                    ) {
                        return boxes[a];
                    }
                }

                return null;
            }

            function gameOver(message) {
                alert(message);

                for (let box of boxes) {
                    box.removeEventListener('click', handleClick);
                }

                restartBtn.style.display = 'block';
            }
        }

        startGame(); // Start the game initially
    </script>
</body>
</html>
